<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>لغز الأسر - المرحلة الثانية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f2a 0%, #071e1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* الزجاجي الساحر */
        .glass-card {
            background: rgba(255, 248, 225, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            border: 1px solid rgba(255, 215, 150, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            padding: 2rem 2rem 2.5rem;
            width: 100%;
            max-width: 580px;
            transition: all 0.3s ease;
        }

        /* التهنئة الأولى */
        .congrats {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 1.2rem;
            border-radius: 48px;
            margin-bottom: 2rem;
            border-right: 5px solid gold;
        }

        .congrats p {
            color: #ffefc0;
            font-size: 1.6rem;
            font-weight: bold;
            text-shadow: 0 2px 5px #00000040;
            line-height: 1.4;
        }

        /* المراحل */
        .stage {
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .hidden-stage {
            display: none;
        }

        .question-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 48px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 1.4rem;
            font-weight: bold;
            color: #fdebb3;
            margin-bottom: 0.8rem;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            font-size: 1.2rem;
            text-align: center;
            border: none;
            border-radius: 60px;
            background: #fffef7;
            color: #1e3a2f;
            font-weight: bold;
            outline: none;
            transition: 0.2s;
            box-shadow: inset 0 1px 4px #00000030, 0 1px 2px white;
        }

        input:focus {
            transform: scale(1.01);
            background: #fffff0;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.6);
        }

        button {
            background: #d4a13e;
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            color: #1f3d35;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            width: 100%;
            box-shadow: 0 5px 0 #7a4c1a;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a4c1a;
        }

        .error-msg {
            background: #a1221ad9;
            color: #fff0c0;
            padding: 10px;
            border-radius: 50px;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        /* شاشة النجاح */
        .success-screen {
            text-align: center;
            animation: fadeScale 0.5s ease-out;
        }

        @keyframes fadeScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .confetti-effect {
            background: radial-gradient(circle, #ffd966, #ffb347);
            padding: 2rem;
            border-radius: 64px;
            box-shadow: 0 0 0 6px gold, 0 20px 35px black;
        }

        .success-title {
            font-size: 2.3rem;
            color: #2c1a0a;
            background: gold;
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 60px;
            margin-bottom: 1.5rem;
            font-weight: 900;
        }

        .prize-box {
            background: #1f2a1bc9;
            border-radius: 48px;
            padding: 1rem;
            margin: 1rem 0;
            border: 2px dashed #ffd966;
        }

        .prize-label {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffefb9;
        }

        .prize-answer {
            font-size: 2rem;
            font-weight: 900;
            color: #ffcd7e;
            background: #00000066;
            display: inline-block;
            padding: 8px 28px;
            border-radius: 60px;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .reset-btn {
            background: #2e5f4b;
            box-shadow: 0 5px 0 #14382b;
            margin-top: 25px;
            width: auto;
            display: inline-block;
            padding: 8px 35px;
        }

        footer {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 25px;
            color: #b9b07e;
        }
    </style>
</head>
<body>
<div class="glass-card" id="appRoot">
    <!-- المرحلة 0: الرسالة الترحيبية والصعبة -->
    <div id="stageWelcome" class="stage">
        <div class="congrats">
            <p>🎉 أحب أهنيكم إنكم عرفتوا توصلوا هنا 🎉<br>
            أنتم عرفتوا تعدوا الجزء الأصعب<br>
            ✨ ودلوقتي المرحلة التانية ✨</p>
        </div>
        <button id="startQuestBtn">🚀 إبدأ التحدي</button>
    </div>

    <!-- المرحلة 1: سؤال اسم الأسرة -->
    <div id="stageFamily" class="stage hidden-stage">
        <div class="question-box">
            <label>❓اسم اسرتك؟</label>
            <input type="text" id="familyInput" placeholder="اكتب هنا ..." autocomplete="off">
            <button id="submitFamilyBtn">تأكيد اسم الأسرة</button>
            <div id="familyError" class="error-msg" style="display: none;"></div>
        </div>
        <footer>⭐ العائلات المعتمدة: (أعدادي)  (ثانوي)  (اجتماع الخدام)</footer>
    </div>

    <!-- المرحلة 2: إدخال الباسورد -->
    <div id="stagePassword" class="stage hidden-stage">
        <div class="question-box">
            <label>🔐 كلمة المرور الخاصة بأسرة <span id="familyNameDisplay"></span></label>
            <input type="password" id="passwordInput" placeholder="*****" autocomplete="off">
            <button id="submitPasswordBtn">دخول 🔑</button>
            <div id="passwordError" class="error-msg" style="display: none;"></div>
        </div>
    </div>

    <!-- المرحلة 3: شاشة النجاح + الجائزة -->
    <div id="stageSuccess" class="stage hidden-stage">
        <div class="success-screen confetti-effect">
            <div class="success-title">✔️ نجاح المهمة ✔️</div>
            <div class="prize-box">
                <div class="prize-label">🎁 حل اللغز - الجائزة 🎁</div>
                <div id="prizeValue" class="prize-answer">---</div>
            </div>
            <button id="resetAllBtn" class="reset-btn">🔄 العودة للبداية</button>
        </div>
    </div>
</div>

<script>
    // ------------------- الأسس و البيانات -------------------
    // تعرف على الأسر المقبولة مع احتمالات كتابة الكلمة (مصفوفة من المرادفات)
    const familiesMap = {
        "اعدادي": { passwords: ["57986"], prize: "خادم" },
        "ثانوي": { passwords: ["46484"], prize: "الغد" },
        "اجتماع الخدام": { passwords: ["71486"], prize: "المؤثر" }
    };

    // احتمالات كتابة اسم الأسرة (normalization)
    // جميع الاحتمالات المحتملة لكل عائلة (لينك مع family key)
    const familyAliases = {
        // أعدادي بكل صيغها
        "اعدادي": ["اعدادي", "اعدادى", "اعدادى", "اعدادي", "اعداادي", "إعدادي", "اعدادي", "اعدادى"],
        "ثانوي": ["ثانوي", "ثانوى", "ثانوي", "ثانوى", "ثانـوي", "ثانوي", "ثانويي"],
        "اجتماع الخدام": ["اجتماع الخدام", "اجتماع الخدام", "إجتماع الخدام", "اجتماع الخدام", "اجتماع الخدم", "اجتماع خدم", "اجتماع الخدامين", "اجتماع خدام"]
    };

    // مساعدة: تطبيع الإدخال (إزالة مسافات زائدة، تحويل إلى حروف صغيرة عربية)
    function normalizeInput(str) {
        return str.trim().replace(/\s+/g, ' ').toLowerCase();
    }

    // دالة تحدد العائلة بناءً على النص المدخل (مرنة)
    function detectFamily(inputText) {
        let normalized = normalizeInput(inputText);
        // محاولة مطابقة كل عائلة من خلال alias
        for (let [familyKey, aliases] of Object.entries(familyAliases)) {
            for (let alias of aliases) {
                if (normalized === normalizeInput(alias)) {
                    return familyKey;
                }
            }
        }
        // فحص إضافي مباشر: لو الكلمة متطابقة مع المفاتيح الأساسية بعد التطبيع
        if (normalized === "اعدادي") return "اعدادي";
        if (normalized === "ثانوي") return "ثانوي";
        if (normalized === "اجتماع الخدام") return "اجتماع الخدام";
        return null;
    }

    // التحقق من صحة الباسورد للعائلة المحددة
    function isPasswordValid(familyKey, enteredPassword) {
        const familyData = familiesMap[familyKey];
        if (!familyData) return false;
        return familyData.passwords.includes(enteredPassword.trim());
    }

    // الحصول على الجائزة للعائلة
    function getPrizeForFamily(familyKey) {
        return familiesMap[familyKey]?.prize || "???";
    }

    // عناصر DOM
    const stageWelcome = document.getElementById('stageWelcome');
    const stageFamily = document.getElementById('stageFamily');
    const stagePassword = document.getElementById('stagePassword');
    const stageSuccess = document.getElementById('stageSuccess');

    const startBtn = document.getElementById('startQuestBtn');
    const submitFamilyBtn = document.getElementById('submitFamilyBtn');
    const submitPasswordBtn = document.getElementById('submitPasswordBtn');
    const resetBtn = document.getElementById('resetAllBtn');
    const familyInput = document.getElementById('familyInput');
    const passwordInput = document.getElementById('passwordInput');
    const familyErrorDiv = document.getElementById('familyError');
    const passwordErrorDiv = document.getElementById('passwordError');
    const familyNameDisplaySpan = document.getElementById('familyNameDisplay');
    const prizeValueSpan = document.getElementById('prizeValue');

    // متغيرات الحالة
    let currentFamily = null;   // اسم العائلة الداخلي (مثل "اعدادي")

    // إظهار مرحلة معينة وإخفاء الباقي
    function showStage(stageId) {
        stageWelcome.classList.add('hidden-stage');
        stageFamily.classList.add('hidden-stage');
        stagePassword.classList.add('hidden-stage');
        stageSuccess.classList.add('hidden-stage');
        
        if (stageId === 'welcome') stageWelcome.classList.remove('hidden-stage');
        else if (stageId === 'family') stageFamily.classList.remove('hidden-stage');
        else if (stageId === 'password') stagePassword.classList.remove('hidden-stage');
        else if (stageId === 'success') stageSuccess.classList.remove('hidden-stage');
        
        // مسح أي أخطاء عند الانتقال
        if (familyErrorDiv) familyErrorDiv.style.display = 'none';
        if (passwordErrorDiv) passwordErrorDiv.style.display = 'none';
        if (familyInput) familyInput.value = '';
        if (passwordInput) passwordInput.value = '';
    }

    // بدء الرحلة (من الشاشة الترحيبية للسؤال عن الأسرة)
    startBtn.addEventListener('click', () => {
        showStage('family');
    });

    // التعامل مع إدخال اسم الأسرة بمرونة
    submitFamilyBtn.addEventListener('click', () => {
        const rawFamily = familyInput.value;
        if (!rawFamily.trim()) {
            familyErrorDiv.innerText = "❌ من فضلك اكتب اسم عائلتك!";
            familyErrorDiv.style.display = 'block';
            return;
        }
        
        const detected = detectFamily(rawFamily);
        if (!detected) {
            familyErrorDiv.innerText = "⚠️ اسم الأسرة غير معروف! العائلات المتاحة: (اعدادي - ثانوي - اجتماع الخدام) تأكد من الكتابة.";
            familyErrorDiv.style.display = 'block';
            return;
        }
        
        // تم التعرف على العائلة بنجاح
        currentFamily = detected;
        familyErrorDiv.style.display = 'none';
        // عرض اسم العائلة في مرحلة الباسورد
        let displayFamilyName = "";
        if (currentFamily === "اعدادي") displayFamilyName = "🟢 أعدادي";
        else if (currentFamily === "ثانوي") displayFamilyName = "🔵 ثانوي";
        else if (currentFamily === "اجتماع الخدام") displayFamilyName = "🟤 اجتماع الخدام";
        familyNameDisplaySpan.innerText = displayFamilyName;
        
        // ننتقل لمرحلة كلمة المرور
        showStage('password');
    });
    
    // التحقق من الباسورد
    submitPasswordBtn.addEventListener('click', () => {
        if (!currentFamily) {
            // لو حصل مشكلة نرجع للمرحلة العائلية
            showStage('family');
            return;
        }
        
        const enteredPass = passwordInput.value;
        if (!enteredPass.trim()) {
            passwordErrorDiv.innerText = "❌ كلمة المرور مطلوبة! حاول مرة أخرى.";
            passwordErrorDiv.style.display = 'block';
            return;
        }
        
        const valid = isPasswordValid(currentFamily, enteredPass);
        if (!valid) {
            passwordErrorDiv.innerText = "❌ كلمة المرور غلط! 👎 لازم تحاول تاني. راجع الباسورد المخصص لعائلتك.";
            passwordErrorDiv.style.display = 'block';
            // مسح حقل الباسورد لتجربة جديدة
            passwordInput.value = '';
            return;
        }
        
        // كلمة المرور صحيحة ✅ -> نعرض شاشة النجاح مع الإفكت والجائزة
        const prize = getPrizeForFamily(currentFamily);
        prizeValueSpan.innerText = prize;
        
        // إضافة تأثير نجاح dynamic (effect success)
        // إعادة تعيين أي خطأ
        passwordErrorDiv.style.display = 'none';
        showStage('success');
        
        // تأثير إضافي: نضمن ظهور أنيميشن success screen (موجود بالفعل)
        // نضيف صوت celebration اختياري لكن ليس مطلوبًا لكن سأضيف اهتزاز لطيف أو أي شيء
        // يمكن إضافة تغيير خلفية سريع بصري
        const successDiv = document.querySelector('.confetti-effect');
        if(successDiv) {
            successDiv.style.transform = "scale(1.02)";
            setTimeout(() => { if(successDiv) successDiv.style.transform = ""; }, 300);
        }
    });
    
    // إعادة ضبط كاملة (العودة للبداية)
    resetBtn.addEventListener('click', () => {
        currentFamily = null;
        // إعادة تعيين الحقول
        if(familyInput) familyInput.value = '';
        if(passwordInput) passwordInput.value = '';
        showStage('welcome');
    });
    
    // إضافة إمكانية الضغط على Enter في حقلي الإدخال
    familyInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            submitFamilyBtn.click();
        }
    });
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            submitPasswordBtn.click();
        }
    });
    
    // تأكد من أن البداية تكون بمرحلة الترحيب
    showStage('welcome');
    
    // دعم لو أراد المستخدم كتابة اجتماع الخدام بكل الطرق (إضافة مرونة قصوى في الأسماء)
    // تم تغطية الاحتمالات بشكل ممتاز بواسطة familyAliases
    // إضافة احتمالات خاصة مثل "اعدادي" كتابة "اعدادى" و"اعدادي" و"اعدادى" الخ
    // أيضاً اجتماع الخدام مرن جداً
</script>
</body>
</html>
